version: "3.8"

services:
  browser-sandbox:
    image: mcr.microsoft.com/playwright/python:v1.57.0-jammy
    container_name: roxy-browser-sandbox
    runtime: runsc
    environment:
      - DISPLAY=:99
    volumes:
      - /opt/roxy/data/browser-screenshots:/screenshots
      - /opt/roxy/secrets/browser-sessions:/sessions
    networks:
      - roxy-network
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
