name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov black flake8 mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        flake8 services/ voice/ agents/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 services/ voice/ agents/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Check formatting with black
      run: |
        black --check services/ voice/ agents/ || true
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        mypy services/ --ignore-missing-imports || true
      continue-on-error: true
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=services --cov=voice --cov=agents --cov-report=term-missing || true
      continue-on-error: true
    
    - name: Check repository size
      run: |
        echo "Repository size check"
        du -sh . || true
