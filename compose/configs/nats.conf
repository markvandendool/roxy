#===============================================================================
# NATS Configuration - ROXY CITADEL
# JetStream enabled for persistent messaging
#===============================================================================

# Server
server_name: roxy-nats
listen: 0.0.0.0:4222

# JetStream (store_dir set via --sd flag in docker-compose)
jetstream {
    max_memory_store: 256MB
    max_file_store: 1GB
}

# Monitoring
http_port: 8222

# Logging
debug: false
trace: false
logtime: true

# Limits
max_connections: 1000
max_payload: 8MB
max_pending: 64MB

# Cluster name for identification
cluster {
    name: roxy-cluster
}
